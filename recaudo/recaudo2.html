<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Convivium - Cartera</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="Imagenes/Logo_2.png" alt="Logo">
        </div>
        <div class="usuario">
            <img src="Imagenes/user.png" alt="Usuario">
            <span>Usuario</span>
        </div>
    </header>

    <!-- CONTENEDOR -->
    <div class="contenedor">

        <!-- MENU -->
        <aside class="menu">
            <ul>
                <li>Inicio</li>
                <li>Recaudos</li>
                <li class="activo">Cartera</li>
                <li>Gastos</li>
                <li>Multas</li>
            </ul>

            <!-- CALENDARIO -->
            <div class="calendar">

                <!-- HEADER CALENDARIO -->
                <div class="calendar-header">

                    <!-- MES -->
                    <div class="month-control">
                        <span class="month-change" id="prev-month">
                            <
                        </span>
                        <span class="month-picker" id="month-picker">
                            Mayo
                        </span>
                        <span class="month-change" id="next-month">
                            >
                        </span>
                    </div>

                    <!-- AÑO -->
                    <div class="year-control">
                        <span class="year-change" id="prev-year">
                            <
                        </span>
                        <span id="year">
                            2026
                        </span>
                        <span class="year-change" id="next-year">
                            >
                        </span>
                    </div>
                </div>

                <!-- CUERPO -->
                <div class="calendar-body">

                    <!-- DIAS -->
                    <div class="calendar-week-days">
                        <div>Dom</div>
                        <div>Lun</div>
                        <div>Mar</div>
                        <div>Mie</div>
                        <div>Jue</div>
                        <div>Vie</div>
                        <div>Sab</div>
                    </div>

                    <!-- NUMEROS -->
                    <div class="calendar-days"></div>
                </div>

                <!-- FECHA -->
                <div class="date-time-formate">
                    <div class="time-formate"></div>
                    <div class="date-formate"></div>
                </div>
            </div>

        </aside>

        <!-- CONTENIDO -->
        <main class="contenido">

            <!-- CARD 1 -->
            <div class="bloque">
                <h3>Recaudo</h3>
                <div class="card">
                    <div class="pie-chart">
                        <div class="pie-chart-inner">
                            70%
                        </div>
                    </div>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="bloque">
                <h3>Antigüedad promedio</h3>
                <div class="card">
                    <div class="bar-chart">
                        <div>
                            <div class="bar" style="height: 100px;"></div>
                            <div class="bar-label">45 días</div>
                        </div>

                        <div>
                            <div class="bar" style="height: 80px; background:#3498db;"></div>
                            <div class="bar-label">31-90 días</div>
                        </div>

                        <div>
                            <div class="bar" style="height: 60px; background:#9b59b6;"></div>
                            <div class="bar-label">70 días</div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- CARD 3 -->
            <div class="bloque">
                <h3>Tendencia mensual</h3>
                <div class="card">
                    <p>Aquí irá el gráfico</p>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
